<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; margin: 0; color: #333; }
        header { background: #f8f5f0; padding: 60px 20px; text-align: center; }
        h1 { color: #5d4037; margin-bottom: 10px; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .card-container { display: flex; gap: 20px; margin-top: 30px; }
        .card { flex: 1; border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; }
        .btn { display: inline-block; background: #5d4037; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>일산 우성한의원</h1>
    <p>고원장의 별별이야기에 오신 것을 환영합니다</p>
    <a href="https://blog.naver.com/ko_eui_hyun" class="btn">네이버 블로그 바로가기</a>
</header>

<div class="container">
    <h2>최신 별별이야기</h2>
    <div class="card-container">
        <div class="card">
            <h3>건강 이야기</h3>
            <p>환절기 면역력을 지키는 일산 우성한의원만의 비법...</p>
        </div>
        <div class="card">
            <h3>일상의 기록</h3>
            <p>58세 한의사의 새로운 도전, AI와 함께하는 진료...</p>
        </div>
        <div class="card">
            <h3>진료 안내</h3>
            <p>일산서구 고양대로 726 4층 , 정성을 다하는 우성한의원입니다.</p>
        </div>
    </div>
</div>

</body>
</html>
